<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Fantasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="stylesheet" href="main.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=JetBrains+Mono:wght@500&display=swap');

        :root { --f1-red: #e10600; }
        body { 
            background: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%);
            color: #fff; 
            font-family: 'Titillium Web', sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Glasmorfism */
        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--f1-red), transparent);
            position: absolute;
            bottom: 0;
            left: 0;
            opacity: 0.3;
        }

        /* Responsiva bredder för kolumner */
        .col-pos { width: 50px; }
        .col-driver { min-width: 140px; }
        .col-gap { width: 80px; }
        .col-pts { width: 60px; }

        @media (min-width: 768px) {
            .col-pos { width: 100px; }
            .col-driver { min-width: 300px; }
            .col-gap { width: 150px; }
            .col-pts { width: 120px; }
        }

        /* Behållare för förarbilden - mindre på mobil */
        .driver-img-container {
            width: 35px;
            height: 35px;
            background: transparent;
            overflow: hidden;
            flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .driver-img-container { width: 50px; height: 50px; }
        }
    </style>
</head>
<body class="pb-10">

    <nav class="border-b border-f1 sticky top-0 bg-black/90 backdrop-blur-sm z-50">
        <div class="container mx-auto px-4 md:px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black italic tracking-tighter flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <i data-lucide="flag" class="f1-red-text w-6 h-6 md:w-7 md:h-7"></i>
                F1<span class="f1-red-text">FANTASY</span>
            </h1>
            <ul class="flex space-x-1 md:space-x-2 font-semibold uppercase text-[10px] md:text-xs tracking-widest text-gray-300">
                <li>
                    <a href="index.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-zinc-900 hover:text-white transition">
                        <i data-lucide="home" class="w-4 h-4"></i> <span class="nav-text">Hem</span>
                    </a>
                </li>
                <li>
                    <a href="fantasy.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-zinc-900 hover:text-white transition">
                        <i data-lucide="users" class="w-4 h-4"></i> <span class="nav-text">Fantasy</span>
                    </a>
                </li>
                <li>
                    <a href="stats.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-zinc-900 hover:text-white transition">
                        <i data-lucide="bar-chart-3" class="w-4 h-4"></i> <span class="nav-text hidden sm:inline">Stats</span>
                    </a>
                </li>
                <li>
                    <a href="konto.html" id="auth-nav-link" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-f1-red text-white hover:bg-red-700 transition">
                        <i data-lucide="user-circle" class="w-4 h-4"></i> <span class="nav-text">Konto</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <header class="relative pt-8 md:pt-12 pb-6 md:pb-8 overflow-hidden">
        <div class="container mx-auto px-4 md:px-6 relative z-10">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                <div class="w-full md:w-auto">
                    <div class="flex items-center gap-3 mb-3 md:mb-4">
                        <div id="status-badge" class="flex items-center gap-2 bg-zinc-900 px-2 md:px-3 py-1 rounded-full border border-white/10">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-red-600"></span>
                            </span>
                            <span id="live-indicator" class="text-[8px] md:text-[10px] font-black tracking-widest uppercase">Syncing...</span>
                        </div>
                        <span id="session-type" class="text-f1-red text-[8px] md:text-[10px] font-black tracking-[0.2em] md:tracking-[0.3em] uppercase">Season 2026</span>
                    </div>
                    <h1 id="gp-title" class="text-4xl md:text-7xl font-black italic uppercase tracking-tighter leading-none mb-2">
                        LIVE <span class="text-zinc-800 italic">STATS</span>
                    </h1>
                    <div class="flex items-center gap-2 text-zinc-500">
                        <i data-lucide="map-pin" class="w-3 h-3 md:w-4 md:h-4 text-f1-red"></i>
                        <p id="location-text" class="text-[10px] md:text-xs font-bold uppercase tracking-widest italic">Laddar bana...</p>
                    </div>
                </div>

                <div class="flex gap-2 md:gap-4 w-full md:w-auto justify-start">
                    <div class="glass-card flex-1 md:flex-none px-4 md:px-6 py-3 md:py-4 rounded-2xl md:rounded-3xl text-center">
                        <p class="text-zinc-500 text-[7px] md:text-[9px] font-black uppercase mb-1">Round</p>
                        <p id="round-num" class="text-lg md:text-2xl font-black italic tracking-tighter">--</p>
                    </div>
                    <div class="glass-card flex-1 md:flex-none px-4 md:px-6 py-3 md:py-4 rounded-2xl md:rounded-3xl text-center border-l-2 md:border-l-4 border-f1-red">
                        <p class="text-zinc-500 text-[7px] md:text-[9px] font-black uppercase mb-1">Status</p>
                        <p id="race-status" class="text-lg md:text-2xl font-black italic tracking-tighter uppercase text-f1-red">--</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-2 md:px-6">
        <div class="glass-card rounded-[1.5rem] md:rounded-[2.5rem] overflow-hidden relative">
            <div class="scanline"></div>
            
            <div class="overflow-x-auto overflow-y-hidden">
                <table class="w-full text-left border-collapse table-fixed md:table-auto">
                    <thead>
                        <tr class="bg-white/[0.02] border-b border-white/5">
                            <th class="col-pos py-4 md:py-6 px-2 md:px-8 text-[8px] md:text-[10px] font-black uppercase text-zinc-500 text-center">Pos</th>
                            <th class="col-driver py-4 md:py-6 px-2 text-[8px] md:text-[10px] font-black uppercase text-zinc-500">Driver</th>
                            <th class="col-gap py-4 md:py-6 px-2 text-[8px] md:text-[10px] font-black uppercase text-zinc-500">Gap</th>
                            <th class="col-pts py-4 md:py-6 px-4 md:px-8 text-[8px] md:text-[10px] font-black uppercase text-zinc-500 text-right">Pts</th>
                        </tr>
                    </thead>
                    <tbody id="live-table-body" class="divide-y divide-white/[0.03]">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        const teamColors = {
            'Mercedes': '#27F4D2', 'Ferrari': '#E8002D', 'McLaren': '#FF8000',
            'Red Bull': '#3671C6', 'Aston Martin': '#229971', 'Alpine F1 Team': '#0093CC',
            'RB F1 Team': '#6692FF', 'Haas F1 Team': '#B6BABD', 'Williams': '#64C4FF', 'Audi': '#e10600'
        };

        async function updateLivePage() {
            try {
                const res = await fetch('https://api.jolpi.ca/ergast/f1/current/last/results.json');
                const data = await res.json();
                const race = data.MRData.RaceTable.Races[0];

                document.getElementById('gp-title').innerHTML = `${race.raceName.split(' ')[0]} <span class="text-zinc-800 italic">${race.raceName.split(' ').slice(1).join(' ')}</span>`;
                document.getElementById('location-text').innerText = `${race.Circuit.Location.locality}, ${race.Circuit.Location.country.toUpperCase()}`;
                document.getElementById('round-num').innerText = race.round;
                document.getElementById('race-status').innerText = "Finished";
                document.getElementById('live-indicator').innerText = "Live Stream Data";

                const tbody = document.getElementById('live-table-body');
                tbody.innerHTML = race.Results.map(res => {
                    const color = teamColors[res.Constructor.name] || '#ffffff';
                    const status = res.status || "";
                    let displayTime = "";

                    const normalized = res.Driver.familyName.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    const fileId = normalized.substring(0, 3).toLowerCase();

                    if (status.includes('Lap')) {
                        const lapCount = status.replace(/\D/g, ''); 
                        displayTime = `<span class="text-f1-red font-black text-[9px] md:text-[11px] tracking-tighter">+${lapCount}L</span>`;
                    } else if (res.position === "1") {
                        displayTime = `<span class="text-white font-mono opacity-60 text-[9px] md:text-sm uppercase">Winner</span>`;
                    } else if (res.Time && res.Time.time) {
                        displayTime = `<span class="text-white font-mono text-[10px] md:text-sm">${res.Time.time}</span>`;
                    } else {
                        displayTime = `<span class="text-zinc-500 font-bold text-[8px] md:text-[10px] italic">${status.toUpperCase()}</span>`;
                    }

                    return `
                        <tr class="relative border-b border-white/[0.05] bg-gradient-to-r from-[${color}08] to-transparent">
                            <td class="py-4 md:py-6 px-2 md:px-8 text-center">
                                <span class="text-xl md:text-4xl font-black italic" 
                                    style="color: ${res.position <= 3 ? color : '#3f3f46'}">
                                    ${res.position}
                                </span>
                            </td>

                            <td class="py-4 md:py-6 px-2 min-w-[180px] md:min-w-[350px]">
                                <div class="flex items-center gap-3 md:gap-5">
                                    <div class="w-1 h-10 md:h-14 rounded-full shadow-lg" 
                                        style="background-color: ${color}; box-shadow: 0 0 15px ${color}66"></div>
                                    
                                    <div class="driver-img-container">
                                        <img src="F1driversIMG/${fileId}.png" class="w-full h-full object-cover object-top" onerror="this.src='F1driversIMG/default.png'">
                                    </div>

                                    <div class="flex flex-col">
                                        <span class="hidden md:block text-[10px] font-black uppercase tracking-[0.25em] mb-1" style="color: ${color}">
                                            ${res.Constructor.name}
                                        </span>
                                        <div class="flex flex-col md:flex-row md:items-baseline md:gap-2">
                                            <span class="text-zinc-500 text-[10px] md:text-xs font-bold uppercase tracking-tighter leading-none">${res.Driver.givenName}</span>
                                            <span class="text-lg md:text-2xl font-black italic uppercase text-white tracking-tighter leading-none whitespace-nowrap">
                                                ${res.Driver.familyName}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </td>

                            <td class="py-4 md:py-6 px-2 w-24 md:w-44">
                                <div class="flex flex-col">
                                    <p class="hidden md:block text-[8px] font-black text-zinc-600 uppercase tracking-widest mb-1 font-mono">Gap</p>
                                    <div class="leading-none">${displayTime}</div>
                                </div>
                            </td>

                            <td class="py-4 md:py-6 px-4 md:px-8 text-right w-20 md:w-32">
                                <div class="text-2xl md:text-4xl font-black italic tracking-tighter" 
                                    style="color: ${res.points > 0 ? color : '#1e1e1e'}; 
                                            text-shadow: ${res.points > 0 ? `0 0 20px ${color}44` : 'none'}">
                                    ${res.points}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error("Critical Error:", error);
            }
        }

        updateLivePage();
        setInterval(updateLivePage, 60000);
        lucide.createIcons();
    </script>
</body>
</html>
