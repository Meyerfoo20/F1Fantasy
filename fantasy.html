    <style>
        :root { --f1-red: #e10600; }
        body { background-color: #000; color: #fff; font-family: 'Titillium Web', sans-serif; }
        
        .pitch-container {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            border: 1px solid #222;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2v-4h4v-2H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .slot {
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .slot.filled { border: 1px solid rgba(255,255,255,0.2); }

        .driver-image-edit {
            height: 100%;
            width: 100%;
            object-fit: cover;
            object-position: top center;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .btn-slot-action {
            background: rgba(225, 6, 0, 0.9);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        .slot:hover .btn-slot-action { opacity: 1; transform: translateY(0); }

        .driver-card-preview {
            border-left: 4px solid transparent;
            transition: transform 0.2s;
        }
        .driver-card-preview:hover { transform: translateX(5px); }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: #111; border-left: 4px solid var(--f1-red); padding: 12px 24px; margin-bottom: 8px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Mobilanpassningar */
        @media (max-width: 768px) {
            .pitch-container {
                padding: 1.5rem !important; /* Mindre padding på mobilen */
                min-height: auto !important;
                border-radius: 1.5rem !important;
            }
            
            .slot {
                height: 180px !important; /* Lägre höjd så allt får plats */
                border-radius: 1.5rem !important;
            }

            .slot-constructor {
                height: 100px !important;
            }

            h1 { font-size: 1.25rem !important; }
            #nav-budget { font-size: 1.25rem !important; }
        }

        /* Förbättra scrolling på mobilen */
        #market-list {
            -webkit-overflow-scrolling: touch;
            max-height: 70vh !important;
        }

        /* Stilren tabell-fix */
        #leaderboard-body tr:last-child td {
            border-bottom: none;
        }

        .leaderboard-row {
            transition: transform 0.2s ease;
        }

        .leaderboard-row:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.05);
        }

        /* Ta bort scrollbar-design men behåll funktion */
        #market-list::-webkit-scrollbar {
            width: 4px;
        }
        #market-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        /* Leaderboard Animationer */
        #leaderboard-body tr {
            animation: fadeInRow 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInRow {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Gör att varje rad laddas in lite efter den förra */
        #leaderboard-body tr:nth-child(1) { animation-delay: 0.1s; }
        #leaderboard-body tr:nth-child(2) { animation-delay: 0.15s; }
        #leaderboard-body tr:nth-child(3) { animation-delay: 0.2s; }
        #leaderboard-body tr:nth-child(n+4) { animation-delay: 0.3s; }

        /* Mobilanpassning för tabellen */
        .leaderboard-container {
            overflow-x: hidden; /* Förhindra sidscroll */
        }

        @media (max-width: 640px) {
            #leaderboard-body td {
                padding-top: 1.5rem !important;
                padding-bottom: 1.5rem !important;
                padding-left: 1rem !important;

            }

            }

            .points-box {
                padding: 0.4rem 0.6rem !important;
            }
            
            .points-value {
                font-size: 1.1rem !important;
            }
        }

        // NYHET: Parc Fermé Countdown Funktion
        async function updateParcFermeStatus() {
            try {
                const response = await fetch(`https://api.jolpi.ca/ergast/f1/current/next.json`);
                const resData = await response.json();
                const nextRace = resData.MRData.RaceTable.Races[0];

                if (!nextRace) return;

                // Om API:et inte har FP1-tid (vissa år/races), använd Race-tid minus 48 timmar som backup
                const fp1DateStr = nextRace.FirstPractice ? `${nextRace.FirstPractice.date}T${nextRace.FirstPractice.time}` : `${nextRace.date}T${nextRace.time}`;
                const fp1Start = new Date(fp1DateStr);
                if (!nextRace.FirstPractice) fp1Start.setHours(fp1Start.getHours() - 48);

                const raceStart = new Date(`${nextRace.date}T${nextRace.time}`);
                const raceEnd = new Date(raceStart.getTime() + 2.5 * 60 * 60 * 1000);
                const now = new Date();

                const statusText = document.getElementById('pf-status-text');
                const mainMsg = document.getElementById('pf-main-msg');
                const indicator = document.getElementById('pf-indicator');
                const countdownEl = document.getElementById('pf-countdown');

                if (now >= fp1Start && now <= raceEnd) {
                    lockedByParcFerme = true;
                    if(statusText) statusText.innerText = "Status: Parc Fermé";
                    if(mainMsg) mainMsg.innerText = "Market is Locked";
                    if(indicator) indicator.className = "h-3 w-3 rounded-full bg-red-600 animate-pulse shadow-[0_0_15px_rgba(225,6,0,0.6)]";
                    if(countdownEl) countdownEl.innerText = "LOCKED";
                } else {
                    lockedByParcFerme = false;
                    if(statusText) statusText.innerText = "Status: Open";
                    if(mainMsg) mainMsg.innerText = "Market is Open";
                    if(indicator) indicator.className = "h-3 w-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]";
                    
                    const diff = fp1Start - now;
                    if (diff > 0 && countdownEl) {
                        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                        const m = Math.floor((diff / 1000 / 60) % 60);
                        const s = Math.floor((diff / 1000) % 60);
                        countdownEl.innerText = `${d}d ${h.toString().padStart(2,'0')}h ${m.toString().padStart(2,'0')}m ${s.toString().padStart(2,'0')}s`;
                    } else if(countdownEl) {
                        countdownEl.innerText = "00:00:00";
                    }
                }
            } catch (e) { console.error("PF Update Error:", e); }
        }

        setInterval(updateParcFermeStatus, 1000);

        async function calculatePointsForUser(uid) {
            try {
                const userRef = doc(db, "users", uid);
                const userSnap = await getDoc(userRef);
                const uData = userSnap.data();

                // 1. Hämta senaste avklarade race från API:et
                const infoRes = await fetch(`https://api.jolpi.ca/ergast/f1/current/last/results.json`);
                const infoData = await infoRes.json();
                const raceInfo = infoData.MRData.RaceTable.Races[0];
                
                if (!raceInfo) return 0;

                const season = raceInfo.season;
                const round = parseInt(raceInfo.round);
                const currentRaceName = `${raceInfo.raceName} ${season}`;

                // 2. Kontrollera om poängen redan har delats ut för detta specifika race
                if (uData.lastRaceName === currentRaceName) {
                    console.log("Poäng redan utdelade för:", currentRaceName);
                    return 0;
                }

                // 3. Bestäm vilket lag som ska ge poäng.
                // Vi använder 'lockedTeam' om användaren sparade manuellt, 
                // annars tar vi deras nuvarande aktiva lag ('team' och 'constructor').
                const teamToScore = uData.lockedTeam || {
                    drivers: uData.team || [],
                    constructor: uData.constructor || null
                };

                // Om användaren inte har några förare eller stall alls, avbryt
                if (!teamToScore.drivers.length && !teamToScore.constructor) {
                    return 0;
                }

                // 4. Hämta data för Sprint och Kval för poängberäkning
                let sprintResults = [];
                try {
                    const sprintRes = await fetch(`https://api.jolpi.ca/ergast/f1/${season}/${round}/sprint.json`);
                    const sprintData = await sprintRes.json();
                    sprintResults = sprintData.MRData.RaceTable.Races[0]?.SprintResults || [];
                } catch (e) { console.log("Ingen sprint denna helg"); }

                const qualyRes = await fetch(`https://api.jolpi.ca/ergast/f1/${season}/${round}/qualifying.json`);
                const qualyData = await qualyRes.json();
                
                const raceResults = raceInfo.Results || [];
                const qualyResults = qualyData.MRData.RaceTable.Races[0]?.QualifyingResults || [];

                let lastRacePoints = 0;
                let breakdown = { drivers: {}, constructor: { points: 0, detail: "" } };

                // 5. Räkna poäng för FÖRARE
                teamToScore.drivers.forEach(driverId => {
                    const driverData = data.drivers.find(d => d.id === driverId);
                    if (!driverData) return;

                    const lastName = driverData.name.split(' ').pop().toLowerCase();
                    let dPoints = 0;
                    let details = [];

                    // Race-resultat
                    const raceResult = raceResults.find(r => r.Driver.familyName.toLowerCase() === lastName);
                    if (raceResult) {
                        const p = parseInt(raceResult.points) || 0;
                        dPoints += p;
                        if (p > 0) details.push(`${p} P (Race)`);
                        if (raceResult.FastestLap?.rank === "1") {
                            dPoints += 1;
                            details.push(`1 P (FL)`);
                        }
                    }

                    // Sprint-resultat
                    const sprintResult = sprintResults.find(s => s.Driver.familyName.toLowerCase() === lastName);
                    if (sprintResult) {
                        const sp = parseInt(sprintResult.points) || 0;
                        dPoints += sp;
                        if (sp > 0) details.push(`${sp} P (Sprint)`);
                    }

                    // Pole Position
                    const qualyResult = qualyResults.find(q => q.Driver.familyName.toLowerCase() === lastName);
                    if (qualyResult && qualyResult.position === "1") {
                        dPoints += 4;
                        details.push(`4 P (Pole)`);
                    }

                    breakdown.drivers[driverId] = { points: dPoints, detail: details.join(' + ') || '0 P' };
                    lastRacePoints += dPoints;
                });

                // 6. Räkna poäng för KONSTRUKTÖR
                const constructorData = data.constructors.find(c => c.id === teamToScore.constructor);
                if (constructorData) {
                    const teamRacePoints = raceResults
                        .filter(r => r.Constructor.name.includes(constructorData.team))
                        .reduce((sum, r) => sum + (parseInt(r.points) || 0), 0);
                    
                    const teamSprintPoints = sprintResults
                        .filter(s => s.Constructor.name.includes(constructorData.team))
                        .reduce((sum, s) => sum + (parseInt(s.points) || 0), 0);

                    const totalCPoints = teamRacePoints + teamSprintPoints;
                    breakdown.constructor = { points: totalCPoints, detail: `${totalCPoints} P (Team Total)` };
                    lastRacePoints += totalCPoints;
                }

                // 7. Spara de nya poängen i Firebase
                await updateDoc(userRef, { 
                    seasonTotalPoints: (uData.seasonTotalPoints || 0) + lastRacePoints,
                    lastRacePoints: lastRacePoints,
                    lastRaceName: currentRaceName,
                    pointsBreakdown: breakdown,
                    lockedTeam: null // Vi rensar låsningen så användaren kan börja planera nästa race direkt
                });

                return lastRacePoints;

            } catch (error) { 
                console.error("Fel vid poängberäkning:", error); 
                return 0; 
            }
        }

        window.showToast = (msg) => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast rounded-2xl font-black text-[10px] uppercase text-white shadow-2xl';
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await refreshData();

                setupNotifications();
                
                if (userData) {
                    await calculatePointsForUser(currentUser.uid);
                    await refreshData();

                    if (userData.constructor && (userData.team || []).length === 4) {
                        showLeague();
                    } else {
                        renderSlots();
                        renderMarket();
                    }
                }
            } else { 
                window.location.href = 'konto.html'; 
            }
        });

        async function refreshData() {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if (userDoc.exists()) {
                userData = userDoc.data();
                document.getElementById('nav-username').innerText = userData.username || "User";
                document.getElementById('nav-budget').innerText = `$${((userData.budget || 0) / 1000000).toFixed(1)}M`;
            }
        }

        window.switchView = (view) => {
            currentView = view;
            const btnD = document.getElementById('tab-drivers');
            const btnC = document.getElementById('tab-constructors');
            btnD.className = view === 'drivers' ? "flex-1 py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition-all bg-red-600 text-white" : "flex-1 py-4 rounded-2xl text-xs font-black uppercase text-gray-500 hover:bg-white/5";
            btnC.className = view === 'constructors' ? "flex-1 py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition-all bg-red-600 text-white" : "flex-1 py-4 rounded-2xl text-xs font-black uppercase text-gray-500 hover:bg-white/5";
            renderMarket();
        };

        function renderMarket() {
            const list = document.getElementById('market-list');
            const items = [...data[currentView]].sort((a, b) => b.price - a.price);
            list.innerHTML = items.map(item => {
                const isOwned = (userData.team || []).includes(item.id) || userData.constructor === item.id;
                const color = teamColors[item.team];
                
                // NYHET: Inaktivera knapp om Parc Fermé är aktivt
                const btnLogic = lockedByParcFerme ? 
                    `disabled class="px-4 md:px-6 py-2 md:py-3 rounded-2xl text-[9px] md:text-[10px] font-black uppercase bg-zinc-800 text-zinc-500 cursor-not-allowed border border-white/5 opacity-50"` :
                    `onclick="handlePurchase('${item.id}', ${item.price}, '${currentView}')" class="px-4 md:px-6 py-2 md:py-3 rounded-2xl text-[9px] md:text-[10px] font-black uppercase transition-all ${isOwned ? 'bg-red-600/20 text-red-600 border border-red-600/30' : 'bg-white text-black hover:scale-105 shadow-lg'}"`;

                return `
                    <div class="market-card p-3 md:p-5 bg-white/5 rounded-3xl flex justify-between items-center border border-white/5 hover:bg-white/10 transition-all">
                        <div class="flex items-center gap-3 md:gap-4">
                            <div class="w-1.5 h-10 md:h-12 rounded-full" style="background: ${color}"></div>
                            <div>
                                <p class="text-[7px] md:text-[8px] uppercase font-black tracking-widest opacity-40">${item.team}</p>
                                <h4 class="font-bold text-white text-sm md:text-lg leading-tight">${item.name}</h4>
                                <p class="font-black text-xs md:text-sm text-red-600">$${item.price / 1000000}M</p>
                            </div>
                        </div>
                        <button ${btnLogic}>
                            ${lockedByParcFerme ? '<i data-lucide="lock" class="w-3 h-3 inline mr-1"></i> LÅST' : (isOwned ? 'SÄLJ' : 'KÖP')}
                        </button>
                    </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderSlots() {
            const constSlot = document.getElementById('slot-constructor');
            const hasConstructor = userData.constructor && userData.constructor !== "";
            const myConst = hasConstructor ? data.constructors.find(c => c.id === userData.constructor) : null;

            if (myConst) {
                constSlot.classList.add('filled');
                constSlot.style.borderColor = teamColors[myConst.team];
                constSlot.innerHTML = `
                    <div class="relative w-full h-full flex flex-col items-center justify-center p-4">
                        <p class="text-[9px] uppercase font-black text-gray-500 mb-1 tracking-widest">Konstruktör</p>
                        <p class="text-xl md:text-3xl font-black italic uppercase tracking-tighter text-center" style="color:${teamColors[myConst.team]}">${myConst.name}</p>
                        ${!lockedByParcFerme ? `<button onclick="handlePurchase('${myConst.id}', ${myConst.price}, 'constructors')" class="btn-slot-action absolute top-2 right-2 p-2 rounded-full text-white">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>` : ''}
                    </div>`;
            } else {
                constSlot.classList.remove('filled');
                constSlot.innerHTML = `<span class="text-gray-700 text-[10px] font-black uppercase tracking-widest">Välj Stall</span>`;
            }

            for (let i = 0; i < 4; i++) {
                const slot = document.getElementById(`slot-driver-${i}`);
                const driverId = (userData.team || [])[i];
                const driver = data.drivers.find(d => d.id === driverId);
                if (driver) {
                    slot.classList.add('filled');
                    slot.style.borderColor = teamColors[driver.team];
                    slot.innerHTML = `
                        <img src="F1driversIMG/${driver.id}.png" class="driver-image-edit">
                        <div class="absolute bottom-0 left-0 right-0 p-4 md:p-6 bg-gradient-to-t from-black via-black/80 to-transparent z-10">
                            <p class="text-[7px] md:text-[8px] font-black uppercase tracking-widest opacity-80" style="color:${teamColors[driver.team]}">${driver.team}</p>
                            <p class="text-sm md:text-xl font-black uppercase italic text-white">${driver.name}</p>
                        </div>
                        ${!lockedByParcFerme ? `<button onclick="handlePurchase('${driver.id}', ${driver.price}, 'drivers')" class="btn-slot-action absolute top-2 md:top-4 right-2 md:right-4 p-2 md:p-3 rounded-full text-white z-20 shadow-xl">
                            <i data-lucide="x" class="w-4 md:w-5 h-4 md:h-5"></i>
                        </button>` : ''}
                    `;
                } else {
                    slot.classList.remove('filled');
                    slot.innerHTML = `<span class="text-gray-700 text-[10px] font-black uppercase tracking-widest">Välj Förare</span>`;
                }
            }
            lucide.createIcons();
        }

        window.handlePurchase = async (id, price, type) => {
            // NYHET: Blockeringskontroll
            if (lockedByParcFerme) {
                showToast("PARC FERMÉ: Laget är låst under racehelgen!");
                return;
            }

            const userRef = doc(db, "users", currentUser.uid);
            if (!userData.team) userData.team = [];
            const currentConstructor = (userData.constructor === undefined || userData.constructor === "") ? null : userData.constructor;
            const isOwned = type === 'drivers' ? userData.team.includes(id) : currentConstructor === id;
            
            try {
                if (isOwned) {
                    const updateData = type === 'drivers' 
                        ? { team: arrayRemove(id), budget: (userData.budget || 0) + price }
                        : { constructor: null, budget: (userData.budget || 0) + price };
                    await updateDoc(userRef, updateData);
                    if (type === 'drivers') userData.team = userData.team.filter(t => t !== id);
                    else userData.constructor = null;
                    userData.budget += price;
                    showToast("Sälj genomförd!");
                } else {
                    if (type === 'drivers') {
                        if (userData.team.length >= 4) return showToast("Stallet är fullt!");
                        if ((userData.budget || 0) < price) return showToast("Budgeten räcker inte!");
                        await updateDoc(userRef, { team: arrayUnion(id), budget: (userData.budget || 0) - price });
                        userData.team.push(id);
                    } else {
                        if (typeof currentConstructor === 'string' && currentConstructor.length > 0) return showToast("Sälj nuvarande stall först!");
                        if ((userData.budget || 0) < price) return showToast("Budgeten räcker inte!");
                        await updateDoc(userRef, { constructor: id, budget: (userData.budget || 0) - price });
                        userData.constructor = id;
                    }
                    userData.budget -= price;
                    showToast("Köp genomfört!");
                }
                document.getElementById('nav-budget').innerText = `$${(userData.budget / 1000000).toFixed(1)}M`;
                renderSlots();
                renderMarket();
            } catch (error) { showToast("Något gick fel!"); }
        };

        window.confirmTeam = async () => {
            if (!userData.constructor || (userData.team || []).length < 4) {
                return showToast("Ditt stall är inte komplett!");
            }

            try {
                const userRef = doc(db, "users", currentUser.uid);
                
                const response = await fetch(`https://api.jolpi.ca/ergast/f1/current/next.json`);
                const resData = await response.json();
                const nextRace = resData.MRData.RaceTable.Races[0];
                const raceKey = `${nextRace.season}_${nextRace.round}`;

                await updateDoc(userRef, {
                    lockedTeam: {
                        raceId: raceKey,
                        drivers: userData.team,
                        constructor: userData.constructor
                    }
                });

                showToast("Laget är nu låst och redo för poäng!");
                await refreshData();
                showLeague();
            } catch (e) {
                showToast("Kunde inte låsa laget.");
            }
        };

        async function showLeague() {
            document.getElementById('management-view').classList.add('hidden');
            document.getElementById('league-view').classList.remove('hidden');
            renderPreview(userData);
            
            // Uppdatera Parc Fermé status först
            await updateParcFermeStatus();
            
            const querySnapshot = await getDocs(collection(db, "users"));
            allUsers = querySnapshot.docs.map(doc => ({ ...doc.data(), uid: doc.id }));
            allUsers.sort((a, b) => (b.seasonTotalPoints || 0) - (a.seasonTotalPoints || 0));
            
            const leaderboardBody = document.getElementById('leaderboard-body');
            leaderboardBody.innerHTML = allUsers.map((u, i) => {
                const isCurrentUser = u.uid === currentUser.uid;
                
                // Medalj/Rank visning
                let rankDisplay = `<span class="rank-number text-xl md:text-3xl font-black italic tracking-tighter opacity-20">${i + 1}</span>`;
                if (i === 0) rankDisplay = `<i data-lucide="trophy" class="w-5 h-5 md:w-6 md:h-6 text-yellow-500"></i>`;
                if (i === 1) rankDisplay = `<i data-lucide="trophy" class="w-5 h-5 md:w-6 md:h-6 text-gray-400"></i>`;
                if (i === 2) rankDisplay = `<i data-lucide="trophy" class="w-5 h-5 md:w-6 md:h-6 text-amber-700"></i>`;

                return `
                <tr class="group cursor-pointer transition-all duration-500 border-b border-white/[0.03] hover:bg-white/[0.02]" onclick="viewOtherTeam('${u.uid}')">
                    <td class="py-6 px-2 md:px-6 w-12 md:w-20 text-center">
                        <div class="flex items-center justify-center">${rankDisplay}</div>
                    </td>
                    <td class="py-6 pr-4 md:pr-8">
                        <div class="flex justify-between items-center gap-2">
                            <div class="flex items-center gap-3 md:gap-6">
                                <div class="h-10 w-0.5 md:w-1 bg-zinc-800 group-hover:bg-red-600 transition-colors duration-500"></div>
                                <div class="min-w-0"> <div class="flex items-center gap-2 flex-wrap">
                                        <span class="user-name-text font-black text-white text-base md:text-2xl uppercase tracking-tighter truncate ${isCurrentUser ? 'text-red-500' : ''}">
                                            ${u.username}
                                        </span>
                                        ${isCurrentUser ? '<span class="bg-red-600/10 border border-red-600/50 text-red-600 text-[6px] md:text-[7px] px-1.5 py-0.5 rounded font-black uppercase tracking-widest">Du</span>' : ''}
                                    </div>
                                    <div class="flex items-center gap-1.5 mt-0.5">
                                        <span class="text-[9px] md:text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Total: ${u.seasonTotalPoints || 0}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="text-right shrink-0">
                                <div class="points-box inline-flex flex-col items-end bg-zinc-900/50 px-3 py-1.5 md:px-4 md:py-2 rounded-xl border border-white/5">
                                    <p class="text-[7px] md:text-[8px] text-zinc-500 font-black uppercase tracking-widest leading-none mb-1">Senaste</p>
                                    <span class="points-value text-lg md:text-2xl font-black italic text-white tracking-tighter leading-none">
                                        <span class="text-red-600">+</span>${u.lastRacePoints || 0}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>`;
            }).join('');
            lucide.createIcons();
        }
        window.viewOtherTeam = (uid) => {
            const user = allUsers.find(u => u.uid === uid);
            if (user) {
                document.getElementById('preview-title').innerText = `${user.username}s Stall`;
                renderPreview(user);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.editTeam = () => {
            if (lockedByParcFerme) {
                showToast("PARC FERMÉ: Du kan inte redigera ditt team just nu!");
                return;
            }
            document.getElementById('management-view').classList.remove('hidden');
            document.getElementById('league-view').classList.add('hidden');
            renderSlots();
            renderMarket();
        };

        function renderPreview(user) {
            const summaryDiv = document.getElementById('my-team-summary');
            if (!summaryDiv) return;
            const myDrivers = data.drivers.filter(d => (user.team || []).includes(d.id));
            const myConst = data.constructors.find(c => c.id === user.constructor);
            const breakdown = user.pointsBreakdown || { drivers: {}, constructor: {} };
            const raceName = user.lastRaceName || "Senaste Racet";

            summaryDiv.innerHTML = `
                <div class="space-y-6">
                    <div class="text-center p-6 bg-red-600/10 rounded-[2rem] border border-red-600/20 mb-4">
                        <p class="text-[9px] font-black text-red-600 uppercase tracking-widest mb-1">Resultat: ${raceName}</p>
                        <h3 class="text-4xl md:text-5xl font-black italic text-white tracking-tighter">+${user.lastRacePoints || 0} <span class="text-sm uppercase not-italic text-red-600">Poäng</span></h3>
                    </div>
                    ${myConst ? `
                    <div class="p-5 bg-black rounded-3xl border-l-[6px] flex justify-between items-center" style="border-color: ${teamColors[myConst.team]}">
                        <div>
                            <p class="text-[8px] uppercase text-gray-500 font-black mb-1">Konstruktör</p>
                            <p class="text-white font-black italic uppercase text-xl tracking-tighter">${myConst.name}</p>
                        </div>
                        <p class="text-red-600 font-black text-xl italic">${breakdown.constructor?.points || 0} P</p>
                    </div>` : ''}
                    <div class="grid grid-cols-1 gap-3">
                        ${myDrivers.map(d => {
                            const dStats = breakdown.drivers?.[d.id] || { points: 0, detail: 'Deltog ej' };
                            return `
                            <div class="p-4 rounded-[1.5rem] flex items-center justify-between border border-white/5" 
                                style="background: linear-gradient(135deg, ${teamColors[d.team]}15 0%, rgba(0,0,0,0.9) 100%); border-left: 4px solid ${teamColors[d.team]}">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-xl bg-zinc-800 overflow-hidden border border-white/10">
                                        <img src="F1driversIMG/${d.id}.png" class="w-full h-full object-cover object-top" onerror="this.src='F1driversIMG/default.png'">
                                    </div>
                                    <div>
                                        <p class="text-[7px] font-black uppercase tracking-widest" style="color:${teamColors[d.team]}">${d.team}</p>
                                        <p class="text-white font-bold italic uppercase text-md leading-tight">${d.name}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-white font-black text-lg italic">${dStats.points} P</p>
                                    <p class="text-[7px] text-gray-400 font-bold uppercase">${dStats.detail}</p>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                    <div class="pt-4 border-t border-white/5 flex justify-between items-center px-2">
                        <p class="text-[9px] font-black uppercase text-zinc-500">Säsongstotal:</p>
                        <p class="text-white font-black italic">${user.seasonTotalPoints || 0} P</p>
                    </div>
                </div>`;
        }
        lucide.createIcons();
    </script>
</body>
</html>
