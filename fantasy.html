    <style>
        .pitch-container {
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
            border: 2px solid var(--border-gray);
            position: relative;
        }
        .slot {
            border: 2px dashed #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slot.active {
            border: 2px solid var(--f1-red);
            background: rgba(225, 6, 0, 0.05);
            box-shadow: 0 0 20px rgba(225, 6, 0, 0.1);
        }
        /* Fix för att dölja scrollbar men behålla funktion */
        #market-list::-webkit-scrollbar { display: none; }
        #market-list { -ms-overflow-style: none; scrollbar-width: none; }
        /* Styling för ligan */
        .leaderboard-row {
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }
        .leaderboard-row:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: scale(1.005);
        }
        .rank-number {
            font-family: 'F1-Bold', sans-serif; /* Om du har F1-typsnittet, annars kör vi black italic */
            font-style: italic;
        }
        /* Toast Container */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: #1a1a1a;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 4px solid #e10600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastSlideIn 0.3s ease forwards;
        }

        @keyframes toastSlideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.exit {
            animation: toastSlideOut 0.3s ease forwards;
        }

        @keyframes toastSlideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }
    </style>
</head>

        async function checkParcFerme() {
            try {
                const now = new Date();
                const day = now.getDay();
                if (![0, 5, 6].includes(day)) {
                    isCurrentlyLocked = false;
                    return false;
                }
                const response = await fetch(`https://api.openf1.org/v1/meetings?year=${now.getFullYear()}`);
                const meetings = await response.json();
                const activeMeeting = meetings.find(m => {
                    const start = new Date(m.date_start);
                    const end = new Date(m.date_start);
                    end.setDate(end.getDate() + 3);
                    return now >= start && now <= end;
                });
                isCurrentlyLocked = !!activeMeeting;
                return isCurrentlyLocked;
            } catch (error) {
                console.error("OpenF1 API Error:", error);
                return false;
            }
        }

        async function fetchLatestRaceResults() {
            try {
                const sessionRes = await fetch(`https://api.openf1.org/v1/sessions?session_type=Race&year=${new Date().getFullYear()}`);
                const sessions = await sessionRes.json();
                if (!sessions.length) return null;
                const lastRace = sessions[sessions.length - 1];

                const positionsRes = await fetch(`https://api.openf1.org/v1/position?session_key=${lastRace.session_key}`);
                const positions = await positionsRes.json();

                const finalPositions = {};
                positions.forEach(p => { finalPositions[p.driver_number] = p.position; });

                return { raceId: lastRace.session_key, results: finalPositions };
            } catch (error) {
                console.error("Auto-points error:", error);
                return null;
            }
        }

        async function distributePointsAutomatically() {
            try {
                // NYTT: Sätter startdatum till 20 maj 2026
                const startDate = new Date('2026-05-20');
                const sessionRes = await fetch(`https://api.openf1.org/v1/sessions?year=2026`);
                const allSessions = await sessionRes.json();
                
                // NYTT: Filtrerar sessioner som sker efter startdatumet
                const relevantSessions = allSessions.filter(s => {
                    const sessionDate = new Date(s.date_start);
                    return (s.session_type === 'Race' || s.session_type === 'Sprint') && sessionDate >= startDate;
                });

                if (!relevantSessions.length) return;

                for (const session of relevantSessions) {
                    const raceId = String(session.session_key);
                    const raceRef = doc(db, "processed_races", raceId);
                    const raceSnap = await getDoc(raceRef);
                    
                    if (raceSnap.exists()) continue;

                    console.log(`Processar poäng för: ${session.session_name} (${session.session_type})`);

                    let pointsTable;
                    if (session.session_type === 'Sprint') {
                        pointsTable = { 1: 8, 2: 7, 3: 6, 4: 5, 5: 4, 6: 3, 7: 2, 8: 1 };
                    } else {
                        pointsTable = { 1: 25, 2: 18, 3: 15, 4: 12, 5: 10, 6: 8, 7: 6, 8: 4, 9: 2, 10: 1 };
                    }

                    const posRes = await fetch(`https://api.openf1.org/v1/position?session_key=${session.session_key}`);
                    const positions = await posRes.json();
                    const finalPositions = {};
                    positions.forEach(p => { finalPositions[p.driver_number] = p.position; });

                    const querySnapshot = await getDocs(collection(db, "users"));
                    for (const userDoc of querySnapshot.docs) {
                        const user = userDoc.data();
                        // NYTT: Sparar session_name och datum för historiken
                        let sessionLog = { 
                            name: session.session_name, 
                            type: session.session_type, 
                            date: session.date_start,
                            points: 0, 
                            breakdown: [] 
                        };

                        (user.team || []).forEach(driverId => {
                            const dObj = data.drivers.find(d => d.id === driverId);
                            if (dObj && finalPositions[dObj.number]) {
                                const pts = pointsTable[finalPositions[dObj.number]] || 0;
                                sessionLog.points += pts;
                                // NYTT: Inkluderar kategori i breakdown
                                sessionLog.breakdown.push({ id: driverId, name: dObj.name, pts: pts, category: session.session_type });
                            }
                        });

                        if (user.constructor) {
                            const cObj = data.constructors.find(c => c.id === user.constructor);
                            data.drivers.filter(d => d.team === cObj.team).forEach(td => {
                                if (finalPositions[td.number]) {
                                    const pts = pointsTable[finalPositions[td.number]] || 0;
                                    sessionLog.points += pts;
                                    sessionLog.breakdown.push({ id: user.constructor, name: cObj.name, pts: pts, category: session.session_type });
                                }
                            });
                        }

                        if (sessionLog.points > 0) {
                            await updateDoc(doc(db, "users", userDoc.id), {
                                points: (user.points || 0) + sessionLog.points,
                                history: arrayUnion(sessionLog)
                            });
                        }
                    }

                    await setDoc(raceRef, { 
                        processed: true, 
                        type: session.session_type, 
                        name: session.session_name,
                        date: new Date() 
                    });
                    
                    showToast(`${session.session_type} poäng utdelade!`, "success");
                }
            } catch (error) {
                console.error("Sprint/Race poängfel:", error);
            }
        }

                </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            lucide.createIcons();
        };

        function darkenColor(hex, percent) {
            const num = parseInt(hex.replace('#',''), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) - amt, G = (num >> 8 & 0x00FF) - amt, B = (num & 0x0000FF) - amt;
            return "#" + (0x1000000 + (R<1?0:R)*0x10000 + (G<1?0:G)*0x100 + (B<1?0:B)).toString(16).slice(1);
        }

                { id: 'had', name: 'Isack Hadjar', team: 'Red Bull', price: 15000000, number: 6 },
                { id: 'sai', name: 'Carlos Sainz', team: 'Williams', price: 13000000, number: 55 },
                { id: 'alb', name: 'Alexander Albon', team: 'Williams', price: 13000000, number: 23 }
            ],
            constructors: [
                { id: 'c_mercedes', name: 'Mercedes-AMG', team: 'Mercedes', price: 30000000 },
                { id: 'c_ferrari', name: 'Scuderia Ferrari', team: 'Ferrari', price: 23000000 },
                { id: 'c_mclaren', name: 'McLaren F1', team: 'McLaren', price: 22000000 },
                { id: 'c_redbull', name: 'Red Bull Racing', team: 'Red Bull', price: 17000000 },
                { id: 'c_audi', name: 'Audi F1 Team', team: 'Audi', price: 12500000 },
                { id: 'c_williams', name: 'Williams Racing', team: 'Williams', price: 12000000 },
                { id: 'c_alpine', name: 'Alpine F1 Team', team: 'Alpine', price: 10000000 },
                { id: 'c_rb', name: 'Visa Cash App RB', team: 'RB', price: 9000000 },
                { id: 'c_haas', name: 'Haas F1 Team', team: 'Haas', price: 8000000 },
                { id: 'c_aston', name: 'Aston Martin Honda', team: 'Aston Martin', price: 5000000 },
                { id: 'c_cadillac', name: 'Andretti Cadillac', team: 'Cadillac', price: 5000000 },
            ]
        };
    
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await checkParcFerme();
                await distributePointsAutomatically();
                const userDoc = await getDoc(doc(db, "users", currentUser.uid));
                userData = userDoc.data();
                
                document.getElementById('nav-username').innerText = userData.username;
                document.getElementById('nav-budget').innerText = `$${(userData.budget / 1000000).toFixed(1)}M`;
                
                const statusDiv = document.getElementById('market-status');
                if (isCurrentlyLocked) {
                    statusDiv.innerText = "Parc Fermé";
                    statusDiv.className = "mt-2 text-[9px] font-black uppercase px-2 py-0.5 rounded border-red-500/50 text-red-500 bg-red-500/10 shadow-[0_0_10px_rgba(239,68,68,0.1)]";
                } else {
                    statusDiv.innerText = "Market Open";
                    statusDiv.className = "mt-2 text-[9px] font-black uppercase px-2 py-0.5 rounded border-green-500/50 text-green-500 bg-green-500/10 shadow-[0_0_10px_rgba(34,197,94,0.1)]";
                }

                if (userData.constructor && userData.team && userData.team.length === 4) {
                    showLeague();
                } else {
                    renderSlots();
                    renderMarket();
                }
            } else { window.location.href = 'konto.html'; }
        });
    
        async function refresh() {
            await checkParcFerme();
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            userData = userDoc.data();
            document.getElementById('nav-username').innerText = userData.username;
            document.getElementById('nav-budget').innerText = `$${(userData.budget / 1000000).toFixed(1)}M`;
            renderSlots();
            renderMarket();
        }
    
        window.switchView = (view) => {
            currentView = view;
            const tabDrivers = document.getElementById('tab-drivers');
            const tabConstructors = document.getElementById('tab-constructors');
            if (view === 'drivers') {
                tabDrivers.className = "flex-1 py-4 text-xs font-black uppercase tracking-widest border-b-2 border-f1-red text-white opacity-100 transition-all duration-300";
                tabConstructors.className = "flex-1 py-4 text-xs font-black uppercase tracking-widest border-b-2 border-transparent text-gray-500 opacity-50 transition-all duration-300";
            } else {
                tabConstructors.className = "flex-1 py-4 text-xs font-black uppercase tracking-widest border-b-2 border-f1-red text-white opacity-100 transition-all duration-300";
                tabDrivers.className = "flex-1 py-4 text-xs font-black uppercase tracking-widest border-b-2 border-transparent text-gray-500 opacity-50 transition-all duration-300";
            }
            renderMarket();
        };
    
        function renderMarket() {
            const list = document.getElementById('market-list');
            const items = [...data[currentView]].sort((a, b) => b.price - a.price);
            const locked = isCurrentlyLocked; 
            
            list.innerHTML = items.map(item => {
                const isOwned = (userData.team || []).includes(item.id) || userData.constructor === item.id;
                const color = teamColors[item.team] || '#333';
                const darkColor = darkenColor(color, 30); 
                const imagePath = `F1driversIMG/${item.id}.png`; 
                const imageHTML = currentView === 'drivers' 
                    ? `<div class="w-12 h-12 rounded-lg flex items-center justify-center overflow-hidden border border-white/5" style="background-color: ${darkColor}"><img src="${imagePath}" class="w-full h-full object-cover object-top" style="transform: scale(1.1);" onerror="this.src='F1driversIMG/placeholder.png'"></div>` : '';
                return `
                    <div class="bg-black/40 border-l-4 p-3 rounded-xl flex justify-between items-center hover:bg-black/60 transition group" style="border-color: ${color}">
                        <div class="flex items-center gap-3">
                            ${imageHTML}
                            <div>
                                <p class="text-[9px] uppercase font-bold tracking-widest" style="color: ${color}">${item.team}</p>
                                <h4 class="font-bold text-sm text-white">${item.name}</h4>
                                <p class="font-black text-xs opacity-80" style="color: ${color}">$${item.price / 1000000}M</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="showDetails('${item.id}')" class="p-2 text-gray-500 hover:text-white transition"><i data-lucide="info" class="w-4 h-4"></i></button>
                            <button onclick="${locked ? "showToast('Parc Fermé: Marknaden stängd!')" : `handlePurchase('${item.id}', ${item.price}, '${currentView}')`}" 
                                class="px-4 py-2 rounded-lg text-[10px] font-black uppercase transition ${locked ? 'bg-zinc-800 text-zinc-500 cursor-not-allowed' : (isOwned ? 'bg-zinc-800 text-gray-500' : 'text-white hover:scale-105')}"
                                style="${(!isOwned && !locked) ? `background-color: ${color}` : ''}">
                                ${locked ? '<i data-lucide="lock" class="w-3 h-3"></i>' : (isOwned ? 'Sälj' : 'Köp')}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }
    
        function renderSlots() {
            const constSlot = document.getElementById('slot-constructor');
            const myConst = data.constructors.find(c => c.id === userData.constructor);
            const constColor = myConst ? teamColors[myConst.team] : '#333';
            constSlot.style.borderColor = constColor;
            constSlot.className = `slot w-64 h-32 rounded-xl flex flex-col items-center justify-center text-center p-4 relative cursor-pointer ${myConst ? 'active border-2' : ''}`;
            
            if (myConst) {
                const totalPointsC = (userData.history || []).reduce((sum, h) => {
                    const item = h.breakdown.find(b => b.id === myConst.id);
                    return sum + (item ? item.pts : 0);
                }, 0);

                constSlot.onclick = () => showDetails(myConst.id);
                constSlot.innerHTML = `
                    <div class="absolute top-2 right-2 bg-black/60 px-2 py-0.5 rounded text-[9px] font-black text-white border border-white/10">${totalPointsC} PTS</div>
                    <span style="color: ${constColor}" class="font-black text-lg uppercase italic tracking-widest">${myConst.name}</span>
                `;
            } else {
                constSlot.onclick = null;
                constSlot.innerHTML = '<span class="text-gray-500 uppercase text-[10px] font-bold tracking-widest">Konstruktör</span><div class="slot-content text-white font-bold uppercase italic text-sm">Välj stall</div>';
            }

            const myDriversIds = userData.team || [];
            for (let i = 0; i < 4; i++) {
                const slot = document.getElementById(`slot-driver-${i}`);
                const driver = data.drivers.find(d => d.id === myDriversIds[i]);
                const dColor = driver ? teamColors[driver.team] : '#333';
                const dDark = darkenColor(dColor, 50);
                slot.style.borderColor = dColor;
                slot.className = `slot h-44 rounded-xl flex flex-col items-center justify-center p-0 overflow-hidden relative transition-all cursor-pointer ${driver ? 'active border-2' : ''}`;
                
                if (driver) {
                    const totalPointsD = (userData.history || []).reduce((sum, h) => {
                        const item = h.breakdown.find(b => b.id === driver.id);
                        return sum + (item ? item.pts : 0);
                    }, 0);

                    slot.onclick = () => showDetails(driver.id);
                    slot.innerHTML = `
                        <div class="w-full h-full relative flex flex-col items-center justify-end" style="background: linear-gradient(to top, ${dDark}, transparent)">
                            <div class="absolute top-3 right-3 bg-black/60 backdrop-blur-md border border-white/10 px-2 py-1 rounded text-[10px] font-black text-white z-20">
                                <span class="text-f1-red">${totalPointsD}</span> PTS
                            </div>
                            <img src="F1driversIMG/${driver.id}.png" class="absolute inset-0 w-full h-full object-cover object-top opacity-80" onerror="this.style.display='none'">
                            <div class="relative z-10 text-center pb-4 w-full bg-black/60 backdrop-blur-sm py-2">
                                <p class="text-white font-black text-sm uppercase italic leading-none">${driver.name.split(' ').pop()}</p>
                                <p class="text-[9px] font-bold uppercase tracking-tighter" style="color: ${dColor}">${driver.team}</p>
                            </div>
                        </div>`;
                } else {
                    slot.onclick = null;
                    slot.innerHTML = `<span class="text-[10px] uppercase text-gray-500 font-bold mb-1 tracking-widest pt-4">Förare ${i + 1}</span><div class="slot-content text-center font-bold italic uppercase text-sm text-gray-600">Välj förare</div>`;
                }
            }
        }
    
        window.handlePurchase = async (id, price, type) => {
            if (isCurrentlyLocked) return showToast("Parc Fermé: Ändringar låsta!");
            const userRef = doc(db, "users", currentUser.uid);
            
            if (type === 'drivers') {
                const isOwned = (userData.team || []).includes(id);
                if (isOwned) {
                    await updateDoc(userRef, { team: arrayRemove(id), budget: userData.budget + price });
                    showToast("Förare såld", "success");
                } else {
                    if ((userData.team || []).length >= 4) return showToast("Max 4 förare!");
                    if (userData.budget < price) return showToast("För lite pengar!");
                    await updateDoc(userRef, { team: arrayUnion(id), budget: userData.budget - price });
                    showToast("Förare köpt", "success");
                }
            } else {
                const isOwned = userData.constructor === id;
                if (isOwned) {
                    await updateDoc(userRef, { constructor: null, budget: userData.budget + price });
                    showToast("Stall sålt", "success");
                } else {
                    const hasActiveConstructor = data.constructors.some(c => c.id === userData.constructor);
                    
                    if (hasActiveConstructor) {
                        return showToast("Sälj ditt nuvarande stall först!");
                    }
                    
                    if (userData.budget < price) return showToast("För lite pengar!");
                    await updateDoc(userRef, { constructor: id, budget: userData.budget - price });
                    showToast("Stall köpt", "success");
                }
            }
            refresh();
        };
    
        window.confirmTeam = async () => {
            if (!userData.constructor || userData.team.length < 4) return showToast("Välj ett fullt lag först!");
            showToast("Laget sparat!", "success");
            showLeague();
        };
    
        async function showLeague() {
            document.querySelector('.grid.grid-cols-1.lg\\:grid-cols-12').classList.add('hidden');
            document.querySelector('button[onclick="confirmTeam()"]').parentElement.classList.add('hidden');
            document.getElementById('league-view').classList.remove('hidden');
            await renderLeaderboard();
            renderMyTeamSummary();
        }
    
        async function renderLeaderboard() {
            const leaderboardBody = document.getElementById('leaderboard-body');
            leaderboardBody.innerHTML = '<tr><td colspan="3" class="p-8 text-center opacity-50 italic">Hämtar ställningen...</td></tr>';
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                const users = [];
                querySnapshot.forEach((doc) => users.push(doc.data()));
                users.sort((a, b) => (b.points || 0) - (a.points || 0));
                
                leaderboardBody.innerHTML = users.map((user, index) => {
                    const isMe = user.username === userData.username;
                    // Vi lägger till onclick="showUserTeam(...)" här:
                    return `
                        <tr class="leaderboard-row border-b border-white/5 cursor-pointer ${isMe ? 'bg-f1-red/10' : ''}" 
                            onclick='showUserTeam(${JSON.stringify(user).replace(/'/g, "&apos;")})'>
                            <td class="p-4">
                                <span class="rank-number text-lg font-black italic ${index < 3 ? 'text-f1-red' : 'text-gray-500'}">${index + 1}</span>
                            </td>
                            <td class="p-4">
                                <span class="font-bold text-base ${isMe ? 'text-white' : 'text-gray-200'}">
                                    ${user.username || 'Okänd'} 
                                    ${isMe ? '<span class="text-[10px] bg-f1-red px-2 py-0.5 rounded ml-2 uppercase">Du</span>' : ''}
                                </span>
                            </td>
                            <td class="p-4 text-right">
                                <span class="font-mono font-black text-lg text-white">${user.points || 0}</span>
                            </td>
                        </tr>`;
                }).join('');
            } catch (error) { 
                console.error(error);
                leaderboardBody.innerHTML = '<tr><td colspan="3">Fel vid laddning.</td></tr>'; 
            }
        }
    
        window.editTeam = () => {
            if (isCurrentlyLocked) return showToast("Parc Fermé: Laget är låst!");
            document.querySelector('.grid.grid-cols-1.lg\\:grid-cols-12').classList.remove('hidden');
            document.querySelector('button[onclick="confirmTeam()"]').parentElement.classList.remove('hidden');
            document.getElementById('league-view').classList.add('hidden');
            renderSlots();
            renderMarket();
        };
    
        function renderMyTeamSummary() {
            const summaryDiv = document.getElementById('my-team-summary');
            const myDrivers = data.drivers.filter(d => userData.team.includes(d.id));
            const myConst = data.constructors.find(c => c.id === userData.constructor);
            const locked = isCurrentlyLocked;

            const totalPointsC = (userData.history || []).reduce((sum, h) => {
                const item = h.breakdown.find(b => b.id === myConst?.id);
                return sum + (item ? item.pts : 0);
            }, 0);

            summaryDiv.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-black/20 p-4 rounded-xl border border-white/5 cursor-pointer hover:bg-black/40 transition" onclick="showDetails('${myConst?.id}')">
                        <p class="text-gray-500 uppercase font-bold text-[10px] mb-2 tracking-widest">Valt Stall</p>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-8 rounded-full" style="background-color: ${myConst ? teamColors[myConst.team] : '#333'}"></div>
                                <p class="text-white font-black text-lg italic uppercase">${myConst ? myConst.name : 'Ej vald'}</p>
                            </div>
                            <span class="text-f1-red font-black text-sm">${totalPointsC} PTS</span>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <p class="text-gray-500 uppercase font-bold text-[10px] mb-2 tracking-widest">Dina Förare</p>
                        ${myDrivers.map(d => {
                            const totalPointsD = (userData.history || []).reduce((sum, h) => {
                                const item = h.breakdown.find(b => b.id === d.id);
                                return sum + (item ? item.pts : 0);
                            }, 0);
                            
                            return `
                            <div class="flex items-center gap-3 bg-black/40 p-3 rounded-lg border-l-4 cursor-pointer hover:bg-black/60 transition" 
                                 style="border-color: ${teamColors[d.team]}" onclick="showDetails('${d.id}')">
                                <img src="F1driversIMG/${d.id}.png" class="w-10 h-10 object-cover object-top rounded-md">
                                <div class="flex-1">
                                    <p class="text-white font-bold text-sm leading-tight">${d.name}</p>
                                    <p class="text-[9px] uppercase font-bold opacity-60" style="color: ${teamColors[d.team]}">${d.team}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-f1-red font-black text-xs">${totalPointsD} PTS</p>
                                </div>
                            </div>`}).join('')}
                    </div>
                    <button onclick="${locked ? "showToast('Laget är låst under race!')" : "editTeam()"}" class="w-full py-3 border border-white/10 rounded-xl text-[10px] uppercase font-black transition-all ${locked ? 'text-zinc-600 bg-white/5 cursor-not-allowed' : 'text-gray-500 hover:text-white hover:bg-white/5'}">
                        ${locked ? '🔒 Parc Fermé' : 'Redigera Mitt Lag'}
                    </button>
                </div>`;
        }
        lucide.createIcons();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));
                `;
                const blob = new Blob([swCode], { type: 'text/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW Error:', err));
            });
        }
    </script>
</body>
</html>
