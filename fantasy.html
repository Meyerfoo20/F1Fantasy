<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>F1 Fantasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="main.css">
    <style>
        :root { --f1-red: #e10600; }
        body { background-color: #000; color: #fff; font-family: 'Titillium Web', sans-serif; }
        
        .pitch-container {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            border: 1px solid #222;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2v-4h4v-2H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .slot {
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .slot.filled { border: 1px solid rgba(255,255,255,0.2); }

        .driver-image-edit {
            height: 100%;
            width: 100%;
            object-fit: cover;
            object-position: top center;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* Knapp inuti slotten (Röda krysset/Soptunnan) */
        .btn-slot-action {
            background: rgba(225, 6, 0, 0.9);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        .slot:hover .btn-slot-action { opacity: 1; transform: translateY(0); }

        /* Förhandsgranskningskort i "Mitt Stall" */
        .driver-card-preview {
            border-left: 4px solid transparent;
            transition: transform 0.2s;
        }
        .driver-card-preview:hover { transform: translateX(5px); }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: #111; border-left: 4px solid var(--f1-red); padding: 12px 24px; margin-bottom: 8px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <nav class="border-b border-white/10 sticky top-0 bg-black/95 backdrop-blur-xl z-50">
        <div class="container mx-auto px-4 md:px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <i data-lucide="zap" class="fill-red-600 text-red-600"></i>
                F1<span class="text-red-600 font-black">FANTASY</span>
            </h1>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p id="nav-username" class="text-gray-500 font-bold text-[9px] uppercase tracking-widest mb-1"></p>
                    <p id="nav-budget" class="text-white font-black text-2xl italic tracking-tighter leading-none"></p>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10" id="management-view">
            <div class="lg:col-span-7">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-black uppercase italic tracking-tight flex items-center gap-3">
                        <span class="w-2 h-8 bg-red-600"></span> Hantera Stall
                    </h2>
                </div>
                
                <div class="pitch-container rounded-[3rem] p-12 min-h-[700px] flex flex-col justify-between border border-white/5">
                    <div class="flex justify-center">
                        <div id="slot-constructor" class="slot w-full max-w-sm h-36 rounded-3xl flex flex-col items-center justify-center text-center p-4"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-8 mt-10">
                        <div id="slot-driver-0" class="slot h-64 rounded-[2rem] flex flex-col items-center justify-end overflow-hidden shadow-2xl"></div>
                        <div id="slot-driver-1" class="slot h-64 rounded-[2rem] flex flex-col items-center justify-end overflow-hidden shadow-2xl"></div>
                        <div id="slot-driver-2" class="slot h-64 rounded-[2rem] flex flex-col items-center justify-end overflow-hidden shadow-2xl"></div>
                        <div id="slot-driver-3" class="slot h-64 rounded-[2rem] flex flex-col items-center justify-end overflow-hidden shadow-2xl"></div>
                    </div>
                </div>

                <div class="mt-12 flex justify-center">
                    <button onclick="confirmTeam()" class="bg-red-600 hover:bg-red-700 text-white px-16 py-5 rounded-full font-black uppercase italic transition-all transform hover:scale-105 shadow-[0_0_40px_rgba(225,6,0,0.3)] flex items-center gap-4 text-lg">
                        Spara Lag <i data-lucide="check-circle" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-zinc-900/60 border border-white/10 rounded-[2.5rem] overflow-hidden sticky top-28 backdrop-blur-xl">
                    <div class="flex p-4 gap-2 bg-black/40">
                        <button onclick="switchView('drivers')" id="tab-drivers" class="flex-1 py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition-all bg-red-600 text-white">Förare</button>
                        <button onclick="switchView('constructors')" id="tab-constructors" class="flex-1 py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition-all text-gray-500 hover:bg-white/5">Stall</button>
                    </div>
                    <div id="market-list" class="p-6 space-y-4 max-h-[600px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
        
        <div id="league-view" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-8">
                    <h2 class="text-2xl font-black uppercase italic mb-8 flex items-center gap-3">
                        <span class="w-2 h-8 bg-red-600"></span> Leaderboard
                    </h2>
                    <div class="bg-zinc-900/40 border border-white/10 rounded-[2.5rem] overflow-hidden backdrop-blur-md">
                        <table class="w-full">
                            <thead class="bg-black/60 text-[10px] font-black uppercase tracking-[0.3em] text-gray-500">
                                <tr>
                                    <th class="p-8 text-left w-24">Pos</th>
                                    <th class="p-8 text-left">Stall</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-body"></tbody>
                        </table>
                    </div>
                </div>
                
                <div class="lg:col-span-4">
                    <div class="sticky top-28">
                        <div class="flex justify-between items-end mb-6">
                            <div>
                                <p class="text-[10px] font-black uppercase text-red-600 tracking-widest mb-1">Preview</p>
                                <h2 id="preview-title" class="text-3xl font-black uppercase italic tracking-tighter">Mitt Stall</h2>
                            </div>
                            <button onclick="editTeam()" class="bg-white/5 hover:bg-white/10 border border-white/10 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="shopping-cart" class="w-4 h-4 text-red-600"></i> Redigera
                            </button>
                        </div>
                        <div id="my-team-summary" class="rounded-[2.5rem] p-8 bg-zinc-900/80 border border-white/10 shadow-2xl"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyAskluSUlzitU5eW6iQ6Jrw6GTXMtlu0-c",
            authDomain: "f1-fantasy-e8204.firebaseapp.com",
            projectId: "f1-fantasy-e8204",
            storageBucket: "f1-fantasy-e8204.firebasestorage.app",
            messagingSenderId: "952247160192",
            appId: "1:952247160192:web:57bd2653326d5c7c7ec565"
        };
    
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
    
        let currentUser = null;
        let userData = null;
        let currentView = 'drivers';
        let allUsers = [];

        const teamColors = {
            'Mercedes': '#27F4D2', 'Ferrari': '#E8002D', 'McLaren': '#FF8000',
            'Audi': '#F30421', 'Red Bull': '#3671C6', 'Cadillac': '#FFFFFF',
            'Aston Martin': '#229971', 'Alpine': '#0093CC', 'RB': '#6692FF',
            'Haas': '#B6BABD', 'Williams': '#64C4FF'
        };

        const data = {
            drivers: [
                { id: 'rus', name: 'George Russell', team: 'Mercedes', price: 26000000 },
                { id: 'ant', name: 'Kimi Antonelli', team: 'Mercedes', price: 32000000 },
                { id: 'gas', name: 'Pierre Gasly', team: 'Alpine', price: 12000000 },
                { id: 'col', name: 'Franco Colapinto', team: 'Alpine', price: 7000000 },
                { id: 'alo', name: 'Fernando Alonso', team: 'Aston Martin', price: 5000000 },
                { id: 'str', name: 'Lance Stroll', team: 'Aston Martin', price: 4500000 },
                { id: 'hul', name: 'Nico Hulkenberg', team: 'Audi', price: 11000000 },
                { id: 'bor', name: 'Gabriel Bortoleto', team: 'Audi', price: 10000000 },
                { id: 'per', name: 'Sergio Perez', team: 'Cadillac', price: 4000000 },
                { id: 'bot', name: 'Valtteri Bottas', team: 'Cadillac', price: 4000000 },
                { id: 'ham', name: 'Lewis Hamilton', team: 'Ferrari', price: 22000000 },
                { id: 'lec', name: 'Charles Leclerc', team: 'Ferrari', price: 26000000 },
                { id: 'oco', name: 'Esteban Ocon', team: 'Haas', price: 11000000 },
                { id: 'bea', name: 'Oliver Bearman', team: 'Haas', price: 11000000 },
                { id: 'nor', name: 'Lando Norris', team: 'McLaren', price: 27000000 },
                { id: 'pia', name: 'Oscar Piastri', team: 'McLaren', price: 24000000 },
                { id: 'law', name: 'Liam Lawson', team: 'RB', price: 12000000 },
                { id: 'lin', name: 'Arvid Lindblad', team: 'RB', price: 11000000 },
                { id: 'ver', name: 'Max Verstappen', team: 'Red Bull', price: 22000000 },
                { id: 'had', name: 'Isack Hadjar', team: 'Red Bull', price: 15000000 },
                { id: 'sai', name: 'Carlos Sainz', team: 'Williams', price: 13000000 },
                { id: 'alb', name: 'Alexander Albon', team: 'Williams', price: 13000000 }
            ],
            constructors: [
                { id: 'c_mercedes', name: 'Mercedes-AMG', team: 'Mercedes', price: 30000000 },
                { id: 'c_ferrari', name: 'Scuderia Ferrari', team: 'Ferrari', price: 23000000 },
                { id: 'c_mclaren', name: 'McLaren F1', team: 'McLaren', price: 22000000 },
                { id: 'c_redbull', name: 'Red Bull Racing', team: 'Red Bull', price: 17000000 },
                { id: 'c_audi', name: 'Audi F1 Team', team: 'Audi', price: 12500000 },
                { id: 'c_williams', name: 'Williams Racing', team: 'Williams', price: 12000000 },
                { id: 'c_alpine', name: 'Alpine F1 Team', team: 'Alpine', price: 10000000 },
                { id: 'c_rb', name: 'Visa Cash App RB', team: 'RB', price: 9000000 },
                { id: 'c_haas', name: 'Haas F1 Team', team: 'Haas', price: 8000000 },
                { id: 'c_aston', name: 'Aston Martin Honda', team: 'Aston Martin', price: 5000000 },
                { id: 'c_cadillac', name: 'Andretti Cadillac', team: 'Cadillac', price: 5000000 }
            ]
        };

        window.showToast = (msg) => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast rounded-2xl font-black text-[10px] uppercase text-white shadow-2xl';
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await refreshData();
                if (userData.constructor && (userData.team || []).length === 4) {
                    showLeague();
                } else {
                    renderSlots();
                    renderMarket();
                }
            } else { window.location.href = 'konto.html'; }
        });

        async function refreshData() {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            userData = userDoc.data();
            document.getElementById('nav-username').innerText = userData.username;
            document.getElementById('nav-budget').innerText = `$${((userData.budget || 0) / 1000000).toFixed(1)}M`;
        }

        window.switchView = (view) => {
            currentView = view;
            const btnD = document.getElementById('tab-drivers');
            const btnC = document.getElementById('tab-constructors');
            btnD.className = view === 'drivers' ? "flex-1 py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition-all bg-red-600 text-white" : "flex-1 py-4 rounded-2xl text-xs font-black uppercase text-gray-500 hover:bg-white/5";
            btnC.className = view === 'constructors' ? "flex-1 py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition-all bg-red-600 text-white" : "flex-1 py-4 rounded-2xl text-xs font-black uppercase text-gray-500 hover:bg-white/5";
            renderMarket();
        };

        function renderMarket() {
            const list = document.getElementById('market-list');
            const items = [...data[currentView]].sort((a, b) => b.price - a.price);
            list.innerHTML = items.map(item => {
                const isOwned = (userData.team || []).includes(item.id) || userData.constructor === item.id;
                const color = teamColors[item.team];
                return `
                    <div class="market-card p-5 bg-white/5 rounded-3xl flex justify-between items-center border border-white/5 hover:bg-white/10 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-1.5 h-12 rounded-full" style="background: ${color}"></div>
                            <div>
                                <p class="text-[8px] uppercase font-black tracking-widest opacity-40">${item.team}</p>
                                <h4 class="font-bold text-white text-lg">${item.name}</h4>
                                <p class="font-black text-sm text-red-600">$${item.price / 1000000}M</p>
                            </div>
                        </div>
                        <button onclick="handlePurchase('${item.id}', ${item.price}, '${currentView}')" 
                            class="px-6 py-3 rounded-2xl text-[10px] font-black uppercase transition-all ${isOwned ? 'bg-red-600/20 text-red-600 border border-red-600/30' : 'bg-white text-black hover:scale-105 shadow-lg'}">
                            ${isOwned ? 'SÄLJ' : 'KÖP'}
                        </button>
                    </div>`;
            }).join('');
        }

        function renderSlots() {
            const constSlot = document.getElementById('slot-constructor');
            const myConst = data.constructors.find(c => c.id === userData.constructor);
            if (myConst) {
                constSlot.classList.add('filled');
                constSlot.style.borderColor = teamColors[myConst.team];
                constSlot.innerHTML = `
                    <div class="relative w-full h-full flex flex-col items-center justify-center">
                        <p class="text-[9px] uppercase font-black text-gray-500 mb-1 tracking-widest">Konstruktör</p>
                        <p class="text-3xl font-black italic uppercase tracking-tighter" style="color:${teamColors[myConst.team]}">${myConst.name}</p>
                        <button onclick="handlePurchase('${myConst.id}', ${myConst.price}, 'constructors')" class="btn-slot-action absolute top-2 right-2 p-2 rounded-full text-white">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>`;
            } else {
                constSlot.classList.remove('filled');
                constSlot.innerHTML = `<span class="text-gray-700 text-[10px] font-black uppercase tracking-widest">Välj Stall</span>`;
            }

            for (let i = 0; i < 4; i++) {
                const slot = document.getElementById(`slot-driver-${i}`);
                const driverId = (userData.team || [])[i];
                const driver = data.drivers.find(d => d.id === driverId);
                if (driver) {
                    slot.classList.add('filled');
                    slot.style.borderColor = teamColors[driver.team];
                    slot.innerHTML = `
                        <img src="F1driversIMG/${driver.id}.png" class="driver-image-edit">
                        <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black/80 to-transparent z-10">
                            <p class="text-[8px] font-black uppercase tracking-widest opacity-80" style="color:${teamColors[driver.team]}">${driver.team}</p>
                            <p class="text-xl font-black uppercase italic text-white">${driver.name}</p>
                        </div>
                        <button onclick="handlePurchase('${driver.id}', ${driver.price}, 'drivers')" class="btn-slot-action absolute top-4 right-4 p-3 rounded-full text-white z-20 shadow-xl">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>`;
                } else {
                    slot.classList.remove('filled');
                    slot.innerHTML = `<span class="text-gray-700 text-[10px] font-black uppercase tracking-widest">Välj Förare</span>`;
                }
            }
            lucide.createIcons();
        }

        window.handlePurchase = async (id, price, type) => {
            const userRef = doc(db, "users", currentUser.uid);
            const isOwned = type === 'drivers' ? (userData.team || []).includes(id) : userData.constructor === id;
            
            if (isOwned) {
                if (type === 'drivers') {
                    await updateDoc(userRef, { team: arrayRemove(id), budget: (userData.budget || 0) + price });
                } else {
                    await updateDoc(userRef, { constructor: null, budget: (userData.budget || 0) + price });
                }
                showToast("Sälj genomförd!");
            } else {
                if (type === 'drivers') {
                    if ((userData.team || []).length >= 4) return showToast("Stallet är fullt!");
                    if ((userData.budget || 0) < price) return showToast("Budgeten räcker inte!");
                    await updateDoc(userRef, { team: arrayUnion(id), budget: (userData.budget || 0) - price });
                } else {
                    if (userData.constructor) return showToast("Sälj nuvarande stall först!");
                    if ((userData.budget || 0) < price) return showToast("Budgeten räcker inte!");
                    await updateDoc(userRef, { constructor: id, budget: (userData.budget || 0) - price });
                }
                showToast("Köp genomfört!");
            }
            await refreshData();
            renderSlots();
            renderMarket();
        };

        window.confirmTeam = () => {
            if (!userData.constructor || (userData.team || []).length < 4) return showToast("Ditt stall är inte komplett!");
            showLeague();
        };

        async function showLeague() {
            document.getElementById('management-view').classList.add('hidden');
            document.getElementById('league-view').classList.remove('hidden');
            renderPreview(userData);
            
            const leaderboardBody = document.getElementById('leaderboard-body');
            const querySnapshot = await getDocs(collection(db, "users"));
            allUsers = [];
            querySnapshot.forEach(doc => {
                const d = doc.data();
                d.uid = doc.id;
                allUsers.push(d);
            });
            
            leaderboardBody.innerHTML = allUsers.map((u, i) => `
                <tr class="leaderboard-row group cursor-pointer" onclick="viewOtherTeam('${u.uid}')">
                    <td class="p-8 text-gray-700 italic font-black text-2xl group-hover:text-red-600 transition-colors">#${i+1}</td>
                    <td class="p-8">
                        <div class="flex items-center justify-between">
                            <div class="font-black text-white text-xl italic uppercase tracking-tight">${u.username || 'Ghost Team'}</div>
                            <i data-lucide="chevron-right" class="text-zinc-700 w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                        </div>
                    </td>
                </tr>`).join('');
            lucide.createIcons();
        }

        window.viewOtherTeam = (uid) => {
            const user = allUsers.find(u => u.uid === uid);
            if (user) {
                document.getElementById('preview-title').innerText = `${user.username}s Stall`;
                renderPreview(user);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.editTeam = () => {
            document.getElementById('management-view').classList.remove('hidden');
            document.getElementById('league-view').classList.add('hidden');
            renderSlots();
            renderMarket();
        };

        function renderPreview(user) {
            const summaryDiv = document.getElementById('my-team-summary');
            const myDrivers = data.drivers.filter(d => (user.team || []).includes(d.id));
            const myConst = data.constructors.find(c => c.id === user.constructor);

            summaryDiv.innerHTML = `
                <div class="space-y-6">
                    <div class="p-6 bg-black rounded-3xl border-l-[6px] shadow-lg" style="border-color: ${myConst ? teamColors[myConst.team] : '#222'}">
                        <p class="text-[9px] uppercase text-gray-500 font-black mb-1">Konstruktör</p>
                        <p class="text-white font-black italic uppercase text-2xl tracking-tighter">${myConst ? myConst.name : 'Ej vald'}</p>
                    </div>
                    
                    <div class="grid grid-cols-1 gap-4">
                        ${myDrivers.map(d => `
                        <div class="driver-card-preview p-5 rounded-[1.8rem] flex items-center gap-6 border border-white/5" 
                             style="background: linear-gradient(135deg, ${teamColors[d.team]}20 0%, rgba(0,0,0,0.9) 100%); border-left-color: ${teamColors[d.team]}">
                            <div class="w-16 h-16 rounded-2xl bg-zinc-800 overflow-hidden flex-shrink-0 border border-white/10 shadow-2xl">
                                <img src="F1driversIMG/${d.id}.png" class="w-full h-full object-cover object-top">
                            </div>
                            <div>
                                <p class="text-[8px] font-black uppercase tracking-[0.2em] mb-1" style="color:${teamColors[d.team]}">${d.team}</p>
                                <p class="text-white font-bold italic uppercase text-lg leading-tight">${d.name}</p>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>`;
        }

        lucide.createIcons();
    </script>
</body>
</html>
